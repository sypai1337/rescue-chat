services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rescue
      POSTGRES_PASSWORD: rescue
      POSTGRES_DB: rescue_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rescue -d rescue_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rescue:rescue@postgres:5432/rescue_chat
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - ./backend:/app
      - /app/venv  # исключаем venv из монтирования
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # исключаем node_modules из монтирования
    environment:
      - CHOKIDAR_USEPOLLING=true  # нужно для hot reload на Windows
    depends_on:
      - backend

volumes:
  postgres_data: